<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        /* Base Styles */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Glassmorphism Card */
        .container {
            max-width: 500px;
            padding: 2rem;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Profile Section */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(45deg, #38bdf8, #818cf8);
            margin: 0 auto 1.5rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        /* Links/Buttons */
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-card {
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f8fafc;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: #38bdf8;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img"></div>
        <h1>Your Name</h1>
        <p>Full Stack Developer & Creative Designer</p>
        
        <div class="links">
            <a href="#" class="link-card">🚀 View My Projects</a>
            <a href="#" class="link-card">📝 Read My Blog</a>
            <a href="#" class="link-card">📫 Contact Me</a>
        </div>

        <footer>
            Built with ✨ and GitHub Pages
        </footer>
    </div>

</body>
</html>
